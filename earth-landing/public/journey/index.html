<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The Hidden Horizon</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body data-world="globe">

<!-- full-bleed painted time-realm backdrop, behind everything -->
<div class="sky" aria-hidden="true">
  <div class="stars"></div>
  <div class="backdrop" id="backdrop"></div>
  <div class="backdrop-scrim"></div>
  <div class="ambient" id="ambient"></div>
</div>

<header class="chrome hidden">
  <div class="mark" id="mark">The Time Map</div>
  <nav class="pillnav" id="pillnav"></nav>
  <div class="chrome-right">
    <button class="pill ghost" id="soundBtn" aria-label="toggle sound">🔇</button>
    <button class="pill solid" id="seals">0 / 5</button>
  </div>
</header>

<main id="stage" class="stage"></main>

<!-- cinematic zoom-wipe between scenes -->
<div class="warp" id="warp" aria-hidden="true"></div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>
<canvas class="confetti-layer" id="confetti"></canvas>

<script type="importmap">
{ "imports": { "three": "./vendor/three.module.js" } }
</script>
<script type="module">
  import * as THREE from "three";
  import { GLTFLoader } from "./vendor/GLTFLoader.js";
  window.THREE = THREE;
  window.GLTFLoader = GLTFLoader;

  const files = [
    "js/config.js", "js/art.js", "js/core.js", "js/globe3d.js", "js/cake3d.js",
    "js/scenes/globe.js", "js/scenes/journey.js",
    "js/scenes/chocobi.js", "js/scenes/memory.js", "js/scenes/debugjs.js",
    "js/scenes/valorant.js", "js/scenes/cake.js", "js/boot.js"
  ];
  for (const src of files) {
    await new Promise((res, rej) => {
      const s = document.createElement("script");
      s.src = src; s.onload = res; s.onerror = () => rej(new Error("failed: " + src));
      document.body.appendChild(s);
    });
  }
</script>
</body>
</html>
